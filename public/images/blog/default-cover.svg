<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="50%" stop-color="#0b0d19"/>
      <stop offset="100%" stop-color="#020205"/>
    </linearGradient>
    <linearGradient id="grid-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>
  
  <!-- Ambient Glow -->
  <circle cx="800" cy="450" r="600" fill="url(#glow)"/>
  
  <!-- Abstract Tech Grid Lines -->
  <path d="M 0,150 L 1600,150 M 0,300 L 1600,300 M 0,450 L 1600,450 M 0,600 L 1600,600 M 0,750 L 1600,750" stroke="url(#grid-grad)" stroke-width="1"/>
  <path d="M 200,0 L 200,900 M 400,0 L 400,900 M 600,0 L 600,900 M 800,0 L 800,900 M 1000,0 L 1000,900 M 1200,0 L 1200,900 M 1400,0 L 1400,900" stroke="url(#grid-grad)" stroke-width="1"/>
  
  <!-- Decorative Shapes / Futuristic HUD Elements -->
  <circle cx="800" cy="450" r="120" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="10 15" opacity="0.6"/>
  <circle cx="800" cy="450" r="80" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="40 10" opacity="0.4"/>
  <circle cx="800" cy="450" r="40" fill="none" stroke="#ec4899" stroke-width="2" opacity="0.5"/>
  
  <!-- Logo / Brand Text Placeholder -->
  <text x="800" y="458" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#ffffff" letter-spacing="8" text-anchor="middle" opacity="0.8">HUYGEN STUDIOS</text>
  <text x="800" y="495" font-family="monospace" font-size="12" fill="#93969e" letter-spacing="4" text-anchor="middle" opacity="0.5">INSIGHTS &amp; TECHNOLOGY</text>
  
  <!-- Corner Tech Borders -->
  <path d="M 50,80 L 50,50 L 80,50" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
  <path d="M 1550,80 L 1550,50 L 1520,50" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
  <path d="M 50,820 L 50,850 L 80,850" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
  <path d="M 1550,820 L 1550,850 L 1520,850" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.6"/>
</svg>
